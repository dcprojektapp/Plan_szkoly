name: school_nav
description: "SchoolNav - Nawigacja wewnątrz budynku szkolnego"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  
  # QR Scanner
  mobile_scanner: ^5.2.3
  
  # Navigation
  go_router: ^14.6.2
  
  # Database & Storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  
  # DI
  get_it: ^8.0.2
  
  # Utils
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/maps/
    - assets/data/
